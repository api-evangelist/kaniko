aid: kaniko
name: Kaniko
description: >-
  Kaniko is an open-source tool from Google that builds container images
  from a Dockerfile inside a container or Kubernetes cluster without
  requiring a Docker daemon. It executes each command within a Dockerfile
  in userspace, enabling secure container builds in environments where
  running a Docker daemon is impractical or insecure. The project was
  archived on June 3, 2025, and is now read-only.
