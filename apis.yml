apis:
  - aid: kaniko:kaniko-cli
    name: Kaniko CLI
    description: >-
      Kaniko is a command-line tool distributed as the container image
      gcr.io/kaniko-project/executor that builds container images from a
      Dockerfile. It supports multiple build context sources (GCS, S3,
      Azure Blob Storage, local directories, Git, stdin), layer caching,
      and credential helpers for GCR, Docker Hub, ECR, and ACR.
